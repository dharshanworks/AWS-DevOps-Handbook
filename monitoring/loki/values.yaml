deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: s3

    bucketNames:
      chunks: aws-devops-handbook-logs-dharshan
      ruler: aws-devops-handbook-logs-dharshan
      admin: aws-devops-handbook-logs-dharshan

    s3:
      region: us-east-1

serviceAccount:
  create: false
  name: loki

singleBinary:
  replicas: 1

  persistence:
    enabled: true
    storageClass: gp2
    size: 10Gi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

gateway:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false